<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reviews</title>
  <link href="style.css" rel="stylesheet">
  <script src="./src/reviews.js" defer></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800">
  <header class="bg-green-700 text-white p-4 flex justify-between">
    <h1 class="text-lg font-bold">RentalTent</h1>
    <div id="navbar"></div>
  </header>

  <main class="p-8">
    <h2 class="text-2xl font-bold mb-4 custom-title">Reviews</h2>
    <section>
      <div class="bg-white rounded-lg p-4 shadow-md mb-4">
        <p>User1: <span class="text-yellow-500">★★★☆☆</span></p>
        <p>Lorem ipsum dolor sit amet...</p>
      </div>
      <div class="bg-white rounded-lg p-4 shadow-md mb-4">
        <p>User2: <span class="text-yellow-500">★★★☆☆</span></p>
        <p>Lorem ipsum dolor sit amet...</p>
      </div>
    </section>

    <h3 class="text-xl font-bold mt-8">Send Your Review</h3>
    <form id="review-form" class="mt-4 bg-white p-4 shadow-lg rounded-lg">
      <textarea id="message" class="w-full p-2 border rounded-md mb-4" rows="4" placeholder="Your review..."></textarea>
      <select id="rating" class="p-2 border rounded-md mb-4">
        <option value="1">1 Star</option>
        <option value="2">2 Stars</option>
        <option value="3">3 Stars</option>
        <option value="4">4 Stars</option>
        <option value="5">5 Stars</option>
      </select>
      <button type="submit" class="bg-green-700 text-white px-4 py-2 rounded-md hover:bg-green-600">Submit</button>
    </form>
  </main>
  <div id="footer"></div>
</body>
</html>
